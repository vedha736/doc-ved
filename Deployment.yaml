apiVersion: apps/v1
kind: Deployment
metadata:
  name: html-demo
spec:
  replicas: 2
  selector:
    matchLabels:      # Indented 2 spaces under selector
      app: html-demo  # Indented 2 spaces under matchLabels
  template:
    metadata:
      labels:         # Indented 2 spaces under metadata
        app: html-demo
    spec:
      containers:     # Indented 2 spaces under spec
      - name: html-demo
        image: dockervedhu/html-demo:latest # Changed to match your Jenkins script
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: html-demo-service
spec:
  type: NodePort
  selector:
    app: html-demo   # Indented 2 spaces under spec
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30010
